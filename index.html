<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DELLA LUCANIA</title>

  <!-- Tipografía serif elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
    }

    .logo {
      text-align: center;
      font-variant: small-caps;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 1.6s ease-out forwards;

      /* mejora tipográfica */
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .top {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 16px; /* más kerning aún */
      margin-bottom: 4px;
    }

    .bottom {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 6px;
    }

    @media (min-width: 768px) {
      .top {
        font-size: 48px;
        letter-spacing: 20px;
      }

      .bottom {
        font-size: 92px;
        letter-spacing: 8px;
      }
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="logo">
    <div class="top">DELLA</div>
    <div class="bottom">LUCANIA</div>
  </div>
</body>
</html>
